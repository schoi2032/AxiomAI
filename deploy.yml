name: Deploy Website
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: AxiomAIapi
        run: |
          # This command finds 'REPLACE_ME_WITH_KEY' and swaps it for your GitHub Secret
          sed -i "s/REPLACE_ME_WITH_KEY/${{ secrets.AxiomAIAPI }}/g" index.html

      - name: Deploy to GitHub Pages
        # (Insert your favorite deployment action here, like peaceiris/actions-gh-pages)
